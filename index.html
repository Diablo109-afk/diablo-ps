<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DIABLO PS</title>

<style>
:root {
  --bg: #0b0f1a;
  --text: #ffffff;
  --card: #111827;
}

body.light {
  --bg: #f5f5f5;
  --text: #111;
  --card: #ffffff;
}

body.normal {
  --bg: #1a1a2e;
  --text: #fff;
  --card: #222;
}

body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  text-align: center;
}

.container {
  flex: 1;
  padding: 20px;
}

/* TITLE */
h1 {
  font-size: 42px;
  font-weight: bold;
  letter-spacing: 3px;
  color: #ff3c00;
  text-shadow: 0 0 10px #ff3c00, 0 0 20px #ff0000;
}

/* BANNER */
.banner {
  width: 90%;
  max-width: 700px;
  border-radius: 10px;
  margin-top: 15px;
}

/* STATUS */
.status {
  margin-top: 15px;
  font-size: 20px;
  color: #00ff9d;
}

/* BUTTON KOTAK */
.button {
  display: block;
  margin: 12px auto;
  padding: 14px;
  width: 85%;
  max-width: 420px;
  border: none;
  border-radius: 5px;
  background: #222;
  color: #fff;
  font-size: 15px;
  cursor: pointer;
  transition: 0.3s;
}

.button:hover {
  background: #ff3c00;
}

/* THEME BUTTON */
.theme-switch {
  margin-top: 20px;
}

.theme-switch button {
  margin: 5px;
  padding: 8px 12px;
  border: none;
  cursor: pointer;
}

/* PLATFORM BUTTON */
.platforms {
  display: flex;
  justify-content: space-around;
  margin-top: 30px;
}

.platform-btn {
  padding: 10px 15px;
  border: none;
  cursor: pointer;
  background: #444;
  color: white;
}

.instructions {
  margin-top: 20px;
  padding: 15px;
  display: none;
  background: var(--card);
  border-radius: 10px;
  text-align: left;
}

/* FOOTER BAWAH BANGET */
.footer {
  text-align: center;
  padding: 15px;
  background: #000;
  margin-top: auto;
}
</style>
</head>

<body class="normal">

<div class="container">

<h1>WELCOME</h1>

<img src="https://raw.githubusercontent.com/Diablo109-afk/diablo-ps/main/file_000000004834722f982d3d0dae57b7fd.png" class="banner">

<div class="status">Server Status: ONLINE</div>

<button class="button" onclick="window.open('https://mediafirehost.com')">Download VHost</button>
<button class="button" onclick="copyText('https://dash.gtps.cloud/android/5218')">Copy Ptunnel</button>
<button class="button" onclick="copyText('https://dash.gtps.cloud/ios/5218')">Copy iOS Host</button>
<button class="button" onclick="copyText(`91.134.85.13 growtopia1.com\n91.134.85.13 growtopia2.com\n91.134.85.13 www.growtopia1.com\n91.134.85.13 www.growtopia2.com`)">Copy Windows Host</button>
<button class="button" onclick="copyText(`91.134.85.13 growtopia1.com\n91.134.85.13 growtopia2.com\n91.134.85.13 www.growtopia1.com\n91.134.85.13 www.growtopia2.com`)">Copy MacOS Host</button>

<div class="platforms">
  <button class="platform-btn" onclick="show('android')">Android</button>
  <button class="platform-btn" onclick="show('ios')">iOS</button>
  <button class="platform-btn" onclick="show('windows')">Windows</button>
</div>

<div id="android" class="instructions">
<b>Android</b><br>
Download Powertunnel → Paste host
</div>

<div id="ios" class="instructions">
<b>iOS</b><br>
Use Surge 5 → Import URL
</div>

<div id="windows" class="instructions">
<b>Windows</b><br>
Edit hosts file → Paste IP
</div>

<div class="theme-switch">
<b>Theme:</b><br>
<button onclick="setTheme('normal')">Normal</button>
<button onclick="setTheme('light')">Light</button>
<button onclick="setTheme('')">Dark</button>
</div>

</div>

<div class="footer">
🐙 DIABLO PS 19-04-2026
</div>

<script>
function copyText(text) {
  navigator.clipboard.writeText(text);
  alert("Copied!");
}

function show(id) {
  document.getElementById('android').style.display = 'none';
  document.getElementById('ios').style.display = 'none';
  document.getElementById('windows').style.display = 'none';
  document.getElementById(id).style.display = 'block';
}

function setTheme(mode) {
  document.body.className = mode;
}
</script>

</body>
</html>
